<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TILINK V6 — Создать Смартлинк</title>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #f00; font-family: 'Dela Gothic One', cursive; text-align: center; line-height: 1.1; }
        .hero { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { font-size: 8vw; text-transform: uppercase; margin-bottom: 20px; }
        .highlight { background: #f00; color: #fff; padding: 5px 20px; display: inline-block; transform: rotate(-2deg); box-shadow: 8px 8px 0 #000; }
        .form-container { width: 100%; max-width: 500px; margin-top: 40px; border: 5px solid #f00; padding: 30px; background: #fff; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 3px solid #f00; font-family: inherit; color: #f00; font-size: 16px; }
        input::placeholder { color: #f00; opacity: 0.5; }
        .btn-add { background: #fff; color: #f00; border: 2px dashed #f00; padding: 10px; cursor: pointer; font-family: inherit; margin: 10px 0; width: 100%; }
        .btn-submit { background: #f00; color: #fff; border: none; padding: 20px; width: 100%; font-family: inherit; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 20px; }
        .btn-submit:hover { transform: scale(1.05); background: #000; }
        #link-list { font-size: 12px; text-align: left; margin: 10px 0; color: #000; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>TILINK <span class="highlight">V6</span></h1>
        
        <div class="form-container">
            <input id="un" placeholder="ЮЗЕРНЕЙМ (ПАПКА)">
            <input id="rn" placeholder="СЛАГ РЕЛИЗА (ПАПКА)">
            <input id="art" placeholder="АРТИСТ">
            <input id="tit" placeholder="НАЗВАНИЕ ТРЕКА">
            <input id="cover" placeholder="URL ОБЛОЖКИ (IMG)">
            <input id="upc" placeholder="UPC (НЕОБЯЗАТЕЛЬНО)">
            
            <div id="link-list"></div>
            <button class="btn-add" onclick="addLink()">+ ДОБАВИТЬ ССЫЛКУ</button>
            
            <button class="btn-submit" onclick="deploy()">ДОБАВИТЬ ПРЕСЕЙВ</button>
        </div>
    </section>

    <script>
        const WORKER_URL = 'https://privateworkerplsdontusemyworkeridontwantitiuseitformyplatform.utubnatoyashiy.workers.dev/api/create'; 

        let customLinks = [];

        function addLink() {
            const url = prompt('Пожалуйста, введите ссылку:');
            if (url) {
                customLinks.push({ url: url, isP: false });
                document.getElementById('link-list').innerHTML += '<div>• ' + url + '</div>';
            }
        }

        async function deploy() {
            const data = {
                username: document.getElementById('un').value,
                releaseName: document.getElementById('rn').value,
                artist: document.getElementById('art').value,
                title: document.getElementById('tit').value,
                coverUrl: document.getElementById('cover').value,
                upc: document.getElementById('upc').value,
                bgColor: "#ffffff", 
                textColor: "#ff0000",
                customLinks: customLinks
            };

            if(!data.username || !data.releaseName) return alert('Пожалуйста, заполните поля папок!');

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    // СОХРАНЯЕМ В ИСТОРИЮ ДЛЯ DASHBOARD
                    let history = JSON.parse(localStorage.getItem('tilink_history') || '[]');
                    history.push(data);
                    localStorage.setItem('tilink_history', JSON.stringify(history));

                    alert('Успешно отправлено на GitHub! Ваш смартлинк скоро будет готов.');
                } else {
                    alert('Ошибка воркера. Проверьте статус вашего Cloudflare Worker.');
                }
            } catch (e) {
                alert('Произошла системная ошибка: ' + e.message);
            }
        }
    </script>
</body>
</html>
