<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TILINK V6 — DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #f00; font-family: 'Dela Gothic One', cursive; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 5px solid #f00; padding-bottom: 20px; }
        h1 { font-size: 40px; text-transform: uppercase; }
        .btn-new { background: #f00; color: #fff; padding: 10px 20px; text-decoration: none; font-size: 14px; border-radius: 5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 4px solid #f00; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 10px 10px 0 #f00; }
        
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #f00; background: #eee; }
        .card-info { text-align: left; }
        .card-info h3 { font-size: 18px; text-transform: uppercase; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 12px; opacity: 0.8; }

        .card-btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; text-align: center; text-decoration: none; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .btn-open { background: #f00; color: #fff; }
        .btn-del { background: #000; color: #fff; cursor: pointer; border: none; font-family: inherit; }

        .empty { text-align: center; padding: 100px 0; font-size: 20px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DASH<span style="color: #fff; background: #f00; padding: 0 10px;">BOARD</span></h1>
            <a href="create.html" class="btn-new">+ НОВЫЙ РЕЛИЗ</a>
        </header>

        <div id="list" class="grid"></div>
        <div id="empty" class="empty" style="display: none;">ТУТ ПОКА ПУСТО, БРО...</div>
    </div>

    <script>
        function render() {
            const list = document.getElementById('list');
            const empty = document.getElementById('empty');
            const data = JSON.parse(localStorage.getItem('tilink_history') || '[]');

            if (data.length === 0) {
                empty.style.display = 'block';
                list.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            // Выводим последние релизы первыми
            list.innerHTML = data.reverse().map((item, index) => `
                <div class="card">
                    <img src="${item.coverUrl || 'https://via.placeholder.com/300?text=NO+COVER'}" alt="cover">
                    <div class="card-info">
                        <h3>${item.title}</h3>
                        <p>${item.artist}</p>
                        <p style="font-size: 10px; margin-top: 5px;">Путь: /${item.username}/${item.releaseName}</p>
                    </div>
                    <div class="card-btns">
                        <a href="https://vggluck.github.io/tilinklink/${item.username}/${item.releaseName}" target="_blank" class="btn btn-open">ОТКРЫТЬ</a>
                        <button onclick="remove(${data.length - 1 - index})" class="btn btn-del">УДАЛИТЬ</button>
                    </div>
                </div>
            `).join('');
        }

        function remove(idx) {
            if (confirm('Удалить этот релиз из списка? (С Гитхаба он не удалится)')) {
                let data = JSON.parse(localStorage.getItem('tilink_history') || '[]');
                data.splice(idx, 1);
                localStorage.setItem('tilink_history', JSON.stringify(data));
                render();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
